<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6d28d9">
<title>Mentor IA — Formation</title>
<style>
  :root {
    --bg: #f6f7fb; --card: #ffffff; --ink: #1c2030; --muted: #6b7280;
    --accent: #6d28d9; --accent-soft: #ede9fe; --ok: #059669; --ok-soft: #d1fae5;
    --err: #dc2626; --err-soft: #fee2e2; --line: #e5e7eb; --shadow: 0 6px 24px rgba(20,20,50,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117; --card: #191c26; --ink: #e8eaf2; --muted: #9aa1b4;
      --accent: #a78bfa; --accent-soft: #2a2140; --ok: #34d399; --ok-soft: #123a2c;
      --err: #f87171; --err-soft: #3a1a1a; --line: #2a2e3c; --shadow: 0 6px 24px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
  header { display: flex; align-items: center; gap: 10px; padding: 6px 2px 14px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header .dot { font-size: 22px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .certs { display: grid; gap: 12px; }
  .cert {
    text-align: left; width: 100%; cursor: pointer; border: 1px solid var(--line);
    background: var(--card); color: inherit; border-radius: 16px; padding: 16px;
    box-shadow: var(--shadow); transition: transform .08s ease, border-color .15s;
  }
  .cert:active { transform: scale(.99); }
  .cert:hover { border-color: var(--accent); }
  .cert h2 { margin: 0 0 4px; font-size: 17px; }
  .cert p { margin: 0 0 10px; color: var(--muted); font-size: 14px; }
  .bar { height: 8px; background: var(--accent-soft); border-radius: 99px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s ease; }
  .bar-label { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .crumbs { font-size: 12.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .content h3 { margin: 2px 0 10px; font-size: 20px; }
  .content p { margin: 0 0 10px; }
  .content ul { margin: 0 0 10px; padding-left: 20px; }
  .content code {
    background: var(--accent-soft); padding: 1px 6px; border-radius: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 90%;
  }
  .content pre {
    background: var(--accent-soft); padding: 12px; border-radius: 12px; overflow-x: auto;
  }
  .content pre code { background: none; padding: 0; }
  .keys { margin-top: 10px; padding: 12px 14px; background: var(--accent-soft); border-radius: 12px; }
  .keys b { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--accent); margin-bottom: 6px; }
  .keys ul { margin: 0; padding-left: 18px; }
  .q { font-weight: 600; margin: 4px 0 12px; }
  .choices { display: grid; gap: 10px; }
  .choice {
    text-align: left; border: 1.5px solid var(--line); background: var(--card); color: inherit;
    border-radius: 14px; padding: 13px 15px; font-size: 15px; cursor: pointer; transition: .12s;
  }
  .choice:hover:not(:disabled) { border-color: var(--accent); }
  .choice:disabled { cursor: default; opacity: .95; }
  .choice.good { border-color: var(--ok); background: var(--ok-soft); }
  .choice.bad { border-color: var(--err); background: var(--err-soft); }
  .note { border-radius: 12px; padding: 12px 14px; margin-top: 12px; font-size: 14.5px; }
  .note.ok { background: var(--ok-soft); }
  .note.bad { background: var(--err-soft); }
  textarea {
    width: 100%; min-height: 92px; resize: vertical; border: 1.5px solid var(--line);
    border-radius: 14px; padding: 12px 14px; font: inherit; background: var(--bg); color: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button.primary {
    width: 100%; border: none; background: var(--accent); color: #fff; font: inherit; font-weight: 700;
    border-radius: 14px; padding: 14px; cursor: pointer; margin-top: 12px;
  }
  button.primary:disabled { opacity: .55; cursor: default; }
  button.ghost {
    width: 100%; border: 1.5px solid var(--line); background: transparent; color: inherit; font: inherit;
    border-radius: 14px; padding: 13px; cursor: pointer; margin-top: 10px;
  }
  .back { background: none; border: none; color: var(--accent); font: inherit; cursor: pointer; padding: 0; margin-bottom: 10px; }
  .mentor { margin-top: 12px; padding: 14px; border-radius: 14px; background: var(--accent-soft); }
  .mentor .score { font-weight: 700; margin-bottom: 6px; }
  .mentor .tip { margin-top: 8px; font-size: 14px; color: var(--muted); }
  .spin { text-align: center; color: var(--muted); padding: 30px 0; }
  .spin::after { content: "⏳"; font-size: 26px; display: block; animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }
  .hint { color: var(--muted); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="dot">🎓</span>
    <h1>Mentor IA — Formation</h1>
  </header>
  <div id="app"></div>
</div>

<script>
const app = document.getElementById('app');
let state = { cert: null, index: 0, data: null };

const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// Rendu Markdown minimal (gras, code, listes, blocs, paragraphes)
function md(src) {
  const lines = esc(src).split('\n');
  let html = '', inList = false, inCode = false;
  const inline = t => t
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
  for (let ln of lines) {
    if (ln.trim().startsWith('```')) {
      if (!inCode) { html += '<pre><code>'; inCode = true; }
      else { html += '</code></pre>'; inCode = false; }
      continue;
    }
    if (inCode) { html += esc(ln) + '\n'; continue; }
    if (/^\s*[-*]\s+/.test(ln)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + inline(ln.replace(/^\s*[-*]\s+/, '')) + '</li>';
      continue;
    }
    if (inList) { html += '</ul>'; inList = false; }
    if (ln.trim()) html += '<p>' + inline(ln) + '</p>';
  }
  if (inList) html += '</ul>';
  if (inCode) html += '</code></pre>';
  return html;
}

async function api(url, opts) {
  // Ne lève jamais : renvoie toujours du JSON, ou { error: "..." } en cas de souci
  // réseau / HTTP / réponse illisible — pour que l'appelant affiche l'erreur au
  // lieu de laisser un spinner tourner indéfiniment.
  let r;
  try {
    r = await fetch(url, opts);
  } catch (e) {
    return { error: `Connexion au serveur impossible (${esc(e.message)}). Vérifie ta connexion réseau.` };
  }
  let data;
  try {
    data = await r.json();
  } catch (e) {
    return { error: `Réponse illisible du serveur (HTTP ${r.status}).` };
  }
  if (!r.ok && !data.error) data.error = `Erreur serveur (HTTP ${r.status}).`;
  return data;
}

// ---------- Écran d'accueil : choix de la certif ----------
async function showHome() {
  state.cert = null;
  app.innerHTML = '<div class="spin"></div>';
  const certs = await api('/api/certs');
  if (certs.error) { app.innerHTML = `<div class="card">⚠️ ${esc(certs.error)}</div><button class="ghost" onclick="showHome()">Réessayer</button>`; return; }
  let h = '<div class="certs">';
  for (const c of certs) {
    const pct = c.total ? Math.round(c.done / c.total * 100) : 0;
    h += `<button class="cert" onclick="startCert('${c.id}', ${c.index})">
      <h2>${esc(c.titre)}</h2>
      <p>${esc(c.description)}</p>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="bar-label">${c.done}/${c.total} leçons · ${pct}%</div>
    </button>`;
  }
  h += '</div>';
  h += '<p class="hint">Choisis une piste. Chaque leçon est courte, avec un quiz corrigé et une question à laquelle tu réponds de mémoire — je t\'évalue comme un mentor.</p>';
  app.innerHTML = h;
}

function startCert(id, index) {
  state.cert = id;
  state.index = index;
  loadLesson();
}

// ---------- Leçon ----------
async function loadLesson() {
  app.innerHTML = '<button class="back" onclick="showHome()">← Certifications</button><div class="spin"></div>';
  const d = await api(`/api/lesson?cert=${state.cert}&index=${state.index}`);
  if (d.error) { app.innerHTML = `<div class="card">⚠️ ${esc(d.error)}</div><button class="ghost" onclick="loadLesson()">Réessayer</button>`; return; }
  if (d.done) {
    app.innerHTML = `<div class="card"><h3>🎉 Piste terminée !</h3><p>Tu as parcouru toutes les leçons. Reviens réviser, la mémoire aime la répétition espacée.</p></div><button class="ghost" onclick="showHome()">← Certifications</button>`;
    return;
  }
  state.data = d;
  render();
}

function render() {
  const d = state.data, L = d.lecon;
  const pct = Math.round((d.position) / d.total * 100);
  let h = `<button class="back" onclick="showHome()">← Certifications</button>`;
  h += `<div class="bar" style="margin-bottom:12px"><i style="width:${pct}%"></i></div>`;
  h += `<div class="card content">
    <div class="crumbs">${esc(d.module)} · Leçon ${d.position + 1}/${d.total}</div>
    <h3>${esc(L.titre)}</h3>
    ${md(L.contenu)}
    <div class="keys"><b>À retenir</b><ul>${L.points_cles.map(p => '<li>' + md(p).replace(/^<p>|<\/p>$/g, '') + '</li>').join('')}</ul></div>
  </div>`;

  // Quiz QCM
  h += `<div class="card"><div class="q">❓ ${esc(L.quiz.question)}</div><div class="choices" id="choices">`;
  L.quiz.choix.forEach((c, i) => {
    h += `<button class="choice" data-i="${i}" onclick="answerQuiz(this)">${esc(c)}</button>`;
  });
  h += `</div><div id="quiz-note"></div></div>`;

  // Question ouverte (rappel actif) — révélée après le QCM
  h += `<div class="card" id="recall-card" style="display:none">
    <div class="q">✍️ ${esc(L.question_ouverte)}</div>
    <div class="hint">Réponds de mémoire, avec tes mots. Je t'évalue sur le fond.</div>
    <textarea id="recall" placeholder="Ta réponse..."></textarea>
    <button class="primary" id="eval-btn" onclick="evaluate()">Évaluer ma réponse</button>
    <div id="mentor"></div>
  </div>`;

  h += `<button class="ghost" id="next-btn" style="display:none" onclick="next()">Leçon suivante →</button>`;
  app.innerHTML = h;
}

async function answerQuiz(btn) {
  const letter = 'ABCD'[btn.dataset.i];
  document.querySelectorAll('.choice').forEach(b => b.disabled = true);
  const r = await api('/api/answer', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ cert: state.cert, index: state.index, reponse: letter })
  });
  if (r.error) {
    const note = document.getElementById('quiz-note');
    note.className = 'note bad';
    note.innerHTML = `⚠️ ${esc(r.error)}`;
    document.querySelectorAll('.choice').forEach(b => b.disabled = false);
    return;
  }
  document.querySelectorAll('.choice').forEach(b => {
    const l = 'ABCD'[b.dataset.i];
    if (l === r.bonne) b.classList.add('good');
    else if (b === btn) b.classList.add('bad');
  });
  const note = document.getElementById('quiz-note');
  note.className = 'note ' + (r.correct ? 'ok' : 'bad');
  note.innerHTML = (r.correct ? '✅ <b>Bonne réponse !</b> ' : `❌ La bonne réponse était <b>${r.bonne}</b>. `) + esc(r.explication);
  document.getElementById('recall-card').style.display = 'block';
  document.getElementById('recall-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function evaluate() {
  const txt = document.getElementById('recall').value.trim();
  if (!txt) return;
  const btn = document.getElementById('eval-btn');
  btn.disabled = true; btn.textContent = 'Le mentor réfléchit…';
  const box = document.getElementById('mentor');
  box.innerHTML = '<div class="spin"></div>';
  const r = await api('/api/evaluate', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ cert: state.cert, index: state.index, reponse: txt })
  });
  if (r.error) { box.innerHTML = `<div class="note bad">⚠️ ${esc(r.error)}</div>`; btn.disabled = false; btn.textContent = 'Réessayer'; return; }
  const pct = Math.round(r.score * 100);
  const icon = r.correct ? '🌟' : '💡';
  box.innerHTML = `<div class="mentor">
    <div class="score">${icon} Score : ${pct}%</div>
    <div>${esc(r.feedback)}</div>
    <div class="tip">🧠 ${esc(r.conseil)}</div>
  </div>`;
  btn.style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';
}

function next() {
  state.index += 1;
  loadLesson();
}

showHome();
</script>
</body>
</html>
